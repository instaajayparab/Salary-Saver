<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SalarySaver - Budget Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc, updateDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- DATABASE & STATE ---
        let db = null;
        let auth = null;
        let user = null;
        let transactions = [];
        let chart = null;
        let editingId = null; 
        let dailyBudget = 500; // Default
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'salary-saver-pro';

        try {
            if (typeof __firebase_config !== 'undefined') {
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                initAuth();

                onAuthStateChanged(auth, (userData) => {
                    user = userData;
                    if (user) {
                        document.getElementById('user-id-display').innerText = `ID: ${user.uid.substring(0, 8)}`;
                        fetchSettings();
                        setupRealtimeListener();
                    }
                });
            } else {
                loadLocalData();
            }
        } catch (e) {
            loadLocalData();
        }

        async function fetchSettings() {
            if (!db || !user) return;
            const settingsRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'config');
            const snap = await getDoc(settingsRef);
            if (snap.exists()) {
                dailyBudget = snap.data().dailyBudget || 500;
                document.getElementById('budget-setting-input').value = dailyBudget;
                refreshUI();
            }
        }

        window.updateBudget = async () => {
            const newBudget = parseFloat(document.getElementById('budget-setting-input').value);
            if (isNaN(newBudget) || newBudget <= 0) {
                showToast("Enter a valid budget");
                return;
            }
            dailyBudget = newBudget;
            if (db && user) {
                const settingsRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'config');
                await setDoc(settingsRef, { dailyBudget: newBudget }, { merge: true });
            } else {
                localStorage.setItem('salary_saver_budget', dailyBudget);
            }
            refreshUI();
            toggleSettings();
            showToast("Allowance updated! 🎯");
        };

        function setupRealtimeListener() {
            if (!db || !user) return;
            const q = query(
                collection(db, 'artifacts', appId, 'users', user.uid, 'transactions'),
                orderBy('date', 'desc')
            );
            onSnapshot(q, (snapshot) => {
                transactions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                refreshUI();
            }, (error) => console.error(error));
        }

        function loadLocalData() {
            const savedTrans = localStorage.getItem('salary_saver_data');
            const savedBudget = localStorage.getItem('salary_saver_budget');
            if (savedTrans) transactions = JSON.parse(savedTrans);
            if (savedBudget) dailyBudget = parseFloat(savedBudget);
            document.getElementById('budget-setting-input').value = dailyBudget;
            refreshUI();
        }

        function refreshUI() {
            renderTransactions();
            updateDashboard();
            updateChart();
        }

        window.saveTransaction = async () => {
            const type = document.getElementById('type-input').value;
            const amount = parseFloat(document.getElementById('amount-input').value);
            const note = document.getElementById('note-input').value;

            if (isNaN(amount) || amount <= 0) {
                showToast("Enter a valid amount");
                return;
            }

            const entryData = {
                type, amount, note: note || (type === 'saved' ? 'Cooked at home' : 'Food Expense'),
                date: editingId ? transactions.find(t => (t.id === editingId || t.date === editingId))?.date : new Date().toISOString()
            };

            try {
                if (db && user) {
                    if (editingId) {
                        await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'transactions', editingId), entryData);
                    } else {
                        await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'transactions'), entryData);
                    }
                } else {
                    if (editingId) {
                        const idx = transactions.findIndex(t => (t.id === editingId || t.date === editingId));
                        if (idx !== -1) transactions[idx] = entryData;
                    } else {
                        transactions.unshift(entryData);
                    }
                    localStorage.setItem('salary_saver_data', JSON.stringify(transactions));
                    refreshUI();
                }
                toggleModal();
                showToast("Done! ✅");
            } catch (e) { showToast("Error saving"); }
        };

        window.executeDelete = async (id) => {
            if (db && user) {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'transactions', id));
            } else {
                transactions = transactions.filter(t => (t.id !== id && t.date !== id));
                localStorage.setItem('salary_saver_data', JSON.stringify(transactions));
                refreshUI();
            }
            showToast("Deleted");
        };

        window.editEntry = (id) => {
            const entry = transactions.find(t => t.id === id || t.date === id);
            if (!entry) return;
            editingId = id;
            document.getElementById('type-input').value = entry.type;
            document.getElementById('amount-input').value = entry.amount;
            document.getElementById('note-input').value = entry.note;
            document.getElementById('modal-title').innerText = "Edit Entry";
            toggleModal();
        };

        window.toggleModal = () => {
            const m = document.getElementById('add-modal');
            m.classList.toggle('hidden');
            if (m.classList.contains('hidden')) {
                editingId = null;
                document.getElementById('modal-title').innerText = "Add New Entry";
                document.getElementById('amount-input').value = '';
                document.getElementById('note-input').value = '';
            }
        };

        window.toggleSettings = () => {
            document.getElementById('settings-modal').classList.toggle('hidden');
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(`nav-${tab}`).classList.add('active');
            document.getElementById('dashboard-view').classList.toggle('hidden', tab !== 'home');
            document.getElementById('advice-view').classList.toggle('hidden', tab !== 'advice');
        };

        function renderTransactions() {
            const list = document.getElementById('transaction-list');
            list.innerHTML = transactions.length ? '' : `<p class="text-center py-10 opacity-40 font-bold">No entries yet</p>`;
            transactions.forEach(tx => {
                const isExp = tx.type === 'expense';
                const div = document.createElement('div');
                div.className = 'android-card p-4 mb-3 border border-slate-100 animate-slide-up';
                div.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl ${isExp ? 'bg-red-50 text-red-500' : 'bg-emerald-50 text-emerald-500'} flex items-center justify-center text-xl">${isExp ? '🍔' : '💰'}</div>
                            <div>
                                <p class="font-bold text-sm text-slate-800">${tx.note}</p>
                                <p class="text-[10px] text-slate-400 font-bold uppercase">${new Date(tx.date).toLocaleDateString()}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-bold ${isExp ? 'text-red-500' : 'text-emerald-600'}">₹${tx.amount}</p>
                            <div class="flex gap-3 justify-end mt-1">
                                <button onclick="editEntry('${tx.id || tx.date}')" class="text-[10px] font-extrabold text-blue-600">EDIT</button>
                                <button onclick="executeDelete('${tx.id || tx.date}')" class="text-[10px] font-extrabold text-red-400">DEL</button>
                            </div>
                        </div>
                    </div>`;
                list.appendChild(div);
            });
        }

        function updateDashboard() {
            const today = new Date().toDateString();
            const spentToday = transactions
                .filter(tx => new Date(tx.date).toDateString() === today && tx.type === 'expense')
                .reduce((acc, tx) => acc + tx.amount, 0);

            const remaining = Math.max(0, dailyBudget - spentToday);
            document.getElementById('daily-remaining').innerText = `₹${remaining} Left`;
            document.getElementById('budget-info').innerText = `Limit: ₹${dailyBudget}/day`;
            document.getElementById('budget-bar').style.width = `${Math.min(100, (spentToday/dailyBudget)*100)}%`;

            const totalSaved = transactions.filter(t => t.type === 'saved').reduce((a, b) => a + b.amount, 0);
            document.getElementById('total-saved').innerText = `₹${totalSaved}`;
        }

        function updateChart() {
            const canvas = document.getElementById('spendingChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const data = [0, 0, 0, 0, 0, 0, 0];
            transactions.forEach(tx => {
                const diff = Math.floor((new Date() - new Date(tx.date)) / 86400000);
                if (diff < 7 && tx.type === 'expense') data[6-diff] += tx.amount;
            });
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: ['6d','5d','4d','3d','2d','1d','T'], datasets: [{ data, borderColor: '#2563eb', tension: 0.4, fill: true, backgroundColor: 'rgba(37, 99, 235, 0.05)' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
            });
        }

        function showToast(m) {
            const t = document.createElement('div');
            t.className = "fixed bottom-24 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full text-xs font-bold z-[300] shadow-xl";
            t.innerText = m;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; overscroll-behavior: contain; }
        .android-card { background: white; border-radius: 24px; box-shadow: 0 4px 20px -5px rgba(0,0,0,0.05); }
        .fab { position: fixed; bottom: 100px; right: 20px; width: 60px; height: 60px; border-radius: 20px; background: #2563eb; color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3); z-index: 50; }
        .nav-item.active { color: #2563eb; transform: scale(1.05); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slideUp 0.4s ease-out; }
        input, select { font-size: 16px !important; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-32 px-4 pt-safe">

    <header class="py-6 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-extrabold">SalarySaver</h1>
            <p id="user-id-display" class="text-[10px] text-slate-400 font-bold">Syncing...</p>
        </div>
        <button onclick="toggleSettings()" class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center text-slate-600">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
    </header>

    <main id="dashboard-view" class="space-y-6 animate-slide-up">
        <div class="android-card p-6 bg-blue-600 text-white relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex justify-between items-center mb-4">
                    <span id="budget-info" class="text-xs font-bold uppercase opacity-80">Limit: ₹500/day</span>
                    <span id="daily-remaining" class="text-xl font-extrabold tracking-tighter">₹500 Left</span>
                </div>
                <div class="w-full bg-white/20 rounded-full h-2.5 mb-2">
                    <div id="budget-bar" class="bg-white h-2.5 rounded-full transition-all duration-700" style="width: 0%"></div>
                </div>
            </div>
            <div class="absolute -right-6 -bottom-6 opacity-10 text-9xl">💰</div>
        </div>

        <div class="android-card p-5 border-l-4 border-emerald-500">
            <span class="text-[10px] text-slate-400 font-extrabold uppercase tracking-widest">Total Savings Goal</span>
            <p id="total-saved" class="text-2xl font-extrabold text-emerald-600 mt-1">₹0</p>
        </div>

        <div class="android-card p-5 h-44">
            <h3 class="text-[10px] font-extrabold text-slate-400 uppercase mb-4 tracking-widest">Spending Trend</h3>
            <div class="h-28"><canvas id="spendingChart"></canvas></div>
        </div>

        <div class="pb-20">
            <h3 class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-4">Recent Entries</h3>
            <div id="transaction-list"></div>
        </div>
    </main>

    <main id="advice-view" class="hidden py-4 space-y-4 animate-slide-up">
        <h2 class="text-xl font-bold px-2">Saving Advice</h2>
        <div class="android-card p-5 border-l-4 border-blue-500">
            <p class="text-sm font-bold text-blue-600 mb-1">Set a "No Order" Week</p>
            <p class="text-xs text-slate-500">Try surviving on only home food for 7 days. You'll save roughly ₹2,000 on average.</p>
        </div>
    </main>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-slate-900/60 hidden z-[250] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-xs rounded-[32px] p-8 space-y-6 shadow-2xl">
            <h2 class="text-lg font-extrabold">Set Daily Limit</h2>
            <div>
                <label class="block text-[10px] font-extrabold text-slate-400 uppercase mb-2">Allowance (₹)</label>
                <input id="budget-setting-input" type="number" value="500" class="w-full p-4 bg-slate-50 rounded-2xl font-bold text-lg outline-none">
            </div>
            <div class="flex gap-3">
                <button onclick="toggleSettings()" class="flex-1 py-3 font-bold text-slate-400">Close</button>
                <button onclick="updateBudget()" class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg">Save</button>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="add-modal" class="fixed inset-0 bg-slate-900/60 hidden z-[200] flex items-end">
        <div class="bg-white w-full rounded-t-[40px] p-8 pb-12 animate-slide-up shadow-2xl">
            <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-8"></div>
            <div class="space-y-6">
                <h2 id="modal-title" class="text-lg font-extrabold">New Entry</h2>
                <select id="type-input" class="w-full p-4 bg-slate-50 rounded-2xl font-bold appearance-none">
                    <option value="expense">Spent on Food 🍔</option>
                    <option value="saved">Saved Money 💰</option>
                </select>
                <input id="amount-input" type="number" inputmode="numeric" placeholder="Amount ₹" class="w-full p-4 bg-slate-50 rounded-2xl font-bold text-lg outline-none">
                <input id="note-input" type="text" placeholder="Note (e.g. Biryani)" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none">
                <div class="flex gap-4">
                    <button onclick="toggleModal()" class="flex-1 font-bold text-slate-400">Cancel</button>
                    <button onclick="saveTransaction()" class="flex-[2] bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <div class="fab" onclick="toggleModal()">
        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="none" stroke="currentColor" stroke-width="3.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-50 flex justify-around py-5 z-40 max-w-md mx-auto rounded-t-[32px] shadow-lg">
        <div id="nav-home" class="nav-item active flex flex-col items-center" onclick="switchTab('home')">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            <span class="text-[9px] font-bold mt-1">HOME</span>
        </div>
        <div id="nav-advice" class="nav-item flex flex-col items-center" onclick="switchTab('advice')">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
            <span class="text-[9px] font-bold mt-1">TIPS</span>
        </div>
    </nav>
</body>
</html>
